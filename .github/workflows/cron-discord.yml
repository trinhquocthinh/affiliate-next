name: Discord Notification Cron

on:
  schedule:
    # Chạy mỗi 15 phút
    - cron: "*/15 * * * *"
  # Cho phép bạn bấm nút "Run workflow" thủ công trên Github để test
  workflow_dispatch:

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest
    environment: secret

    steps:
      - name: Gửi thông báo qua Node.js Script
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;

            if (!webhookUrl) {
              core.setFailed("Không tìm thấy DISCORD_WEBHOOK_URL");
              return;
            }

            const currentTime = new Date().toLocaleString("vi-VN", { timeZone: "Asia/Ho_Chi_Minh" });

            const payload = {
              embeds: [
                {
                  title: "⏱️ Thông Báo Định Kỳ",
                  description: "Đây là thông báo tự động từ GitHub Actions.",
                  color: 3447003,
                  fields: [
                    { name: "Môi trường", value: "Production", inline: true },
                    { name: "Trạng thái", value: "✅ Hoạt động tốt", inline: true },
                    { name: "Thời gian chạy", value: currentTime, inline: false },
                  ],
                },
              ],
            };

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              core.setFailed(`Lỗi Discord API: ${response.status}`);
            } else {
              console.log("✅ Đã gửi thông báo thành công!");
            }
